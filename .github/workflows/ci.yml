name: CI

on:
  push:
    branches: [main, saran-test]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: TypeScript check + build + unit tests ─────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build (mandatory — catches all errors)
        run: npm run build

      - name: Unit tests
        run: npx vitest run --reporter=verbose
        continue-on-error: true # Don't block until test suite is mature

  # ─── Frontend: E2E tests (Playwright) ────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true # Backend not available in CI — tests will fail on API calls
        env:
          CI: true

  # ─── Backend: Compile + build ────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-java

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compile
        run: mvn compile -q

      - name: Package (skip tests — no test DB in CI)
        run: mvn package -DskipTests -q
