spring:
  application:
    name: emplo-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:5}
      connection-timeout: 30000
      max-lifetime: 1800000
      data-source-properties:
        prepareThreshold: 0

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    property-naming-strategy: SNAKE_CASE

  cache:
    type: caffeine

# ─── Swagger / OpenAPI UI ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha        # sort endpoints alphabetically
    tags-sorter: alpha              # sort tag groups alphabetically
    display-request-duration: true  # show how long each request took
    doc-expansion: none             # collapse all tags by default (cleaner)
    filter: true                    # search box to filter endpoints
    try-it-out-enabled: true        # enable "Try it out" by default
    persist-authorization: true     # keep your JWT token across page reloads
  default-produces-media-type: application/json

server:
  port: 8000

# Application custom properties
app:
  jwt:
    secret: ${JWT_SECRET_KEY:change-me-to-a-long-random-string}
    algorithm: HS256
    access-token-expire-minutes: ${ACCESS_TOKEN_EXPIRE_MINUTES:30}
    refresh-token-expire-days: ${REFRESH_TOKEN_EXPIRE_DAYS:7}
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  rate-limit:
    default-requests-per-minute: 200
    login-requests-per-minute: 5
    refresh-requests-per-minute: 10
  supabase:
    url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    storage-bucket: ${SUPABASE_STORAGE_BUCKET:uploads}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:meta-llama/llama-3.1-8b-instruct:free}
  retention:
    enabled: ${RETENTION_ENABLED:false}
    sensitive-documents-years: ${RETENTION_SENSITIVE_DOCS_YEARS:7}
    personal-data-years: ${RETENTION_PERSONAL_DATA_YEARS:7}
